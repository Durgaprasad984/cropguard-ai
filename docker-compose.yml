version: "3.9"

services:
  backend:
    build: ./backend
    container_name: cropguard_api
    ports:
      - "8000:8000"
    volumes:
      - ./backend/models:/app/models   # mount your best.pt here
    environment:
      - MODEL_PATH=models/best.pt
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    image: nginx:alpine
    container_name: cropguard_web
    ports:
      - "3000:80"
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
    depends_on:
      - backend
    restart: unless-stopped
